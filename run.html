<!DOCTYPE html>
<html><head><title>FlexTPM Remote</title>
<style>body{background:#111;color:#eee;font-family:monospace;padding:40px;}

<body>
<h1>FlexTPM Remote Fix</h1>
<p>Open <b>Admin PowerShell</b> on the target machine, then copy-paste the command below:</p>

<h2>Run Repair + Get-Tpm</h2>
<pre onclick="navigator.clipboard.writeText(this.innerText)">irm https://flextpm.com/r|iex</pre>
<p style="color:#888">Click to copy. Paste into Admin PowerShell.</p>

<h2>Full Diagnostic</h2>
<pre onclick="navigator.clipboard.writeText(this.innerText)">irm https://flextpm.com/d|iex</pre>

<pre onclick="navigator.clipboard.writeText(this.innerText)">irm https://flextpm.com/s|iex</pre>
