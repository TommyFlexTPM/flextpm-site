<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexTPM — Coming Soon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
--bg:#0c0c0d;--bg2:#131315;--bg3:#1a1a1d;
--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--border3:rgba(255,255,255,0.16);
--text:#e8e8ea;--text2:#a0a0a8;--text3:#606068;
--blue:#4a9eff;--blue2:#93c5fd;--blue-bg:rgba(74,158,255,0.07);--blue-border:rgba(74,158,255,0.18);
--grn:#4ade80;
--font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
--mono:'JetBrains Mono','SF Mono',monospace;
}

body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}

.container{text-align:center;max-width:460px;width:100%;}

.logo{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk',var(--font);font-size:16px;font-weight:700;letter-spacing:-0.5px;color:var(--text);margin-bottom:3rem;}
.logo-icon{display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:20px;height:20px;fill:var(--text);stroke:none;}

h1{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:300;letter-spacing:-0.5px;line-height:1.15;margin-bottom:1rem;color:var(--text);}
h1 em{font-style:normal;color:var(--blue2);font-weight:300;}

.subtitle{font-size:15px;color:var(--text2);line-height:1.7;font-weight:300;margin-bottom:2.5rem;}

.email-form{margin-bottom:1rem;}
.email-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.email-input{flex:1;min-width:200px;max-width:280px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s;}
.email-input::placeholder{color:var(--text3);}
.email-input:focus{border-color:var(--blue-border);}
.btn-blue{background:var(--blue-bg);color:var(--blue2);border:0.5px solid var(--blue-border);padding:10px 20px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity 0.15s;font-family:var(--font);}
.btn-blue:hover{opacity:0.75;}
.fine-print{font-size:11px;color:var(--text3);margin-top:0.75rem;font-weight:300;}
.form-error{font-size:11px;color:#f87171;margin-top:0.5rem;display:none;}
.form-success{font-size:13px;color:var(--grn);margin-top:0.75rem;display:none;}

.footer{margin-top:4rem;font-size:11px;color:var(--text3);font-weight:300;opacity:0.5;}

@media(prefers-color-scheme:light){
:root{
--bg:#f8f8f7;--bg2:#ffffff;--bg3:#f0f0ee;
--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.1);--border3:rgba(0,0,0,0.18);
--text:#0f0f10;--text2:#4a4a52;--text3:#9a9aa4;
--blue:#1a6fd4;--blue2:#1558b0;--blue-bg:rgba(26,111,212,0.07);--blue-border:rgba(26,111,212,0.2);
--grn:#16a34a;
}
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill-rule="evenodd"><path d="M8 .5L1.5 3.5v4C1.5 12 4.5 15 8 16c3.5-1 6.5-4 6.5-8.5v-4L8 .5zM8 6a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>
    </div>
    FlexTPM
  </div>

  <h1>Something new is <em>coming.</em></h1>
  <p class="subtitle">TPM 2.0 for machines that need it most. Sign up to be the first to know.</p>

  <div class="email-form">
    <form id="waitlistForm" action="https://formspree.io/f/xyknboaa" method="POST" onsubmit="handleSubmit(event)">
      <input type="hidden" name="_subject" value="FlexTPM Waitlist Signup">
      <div class="email-row">
        <input type="email" name="email" class="email-input" placeholder="your@email.com" required/>
        <button type="submit" class="btn-blue" id="submitBtn">Notify me</button>
      </div>
      <p class="fine-print">No spam. Unsubscribe anytime.</p>
      <p class="form-error" id="formError">Something went wrong. Please try again.</p>
      <p class="form-success" id="formSuccess">You're on the list. We'll be in touch.</p>
    </form>
  </div>

  <p class="footer">&copy; 2026 FlexTPM &middot; Houston, TX</p>
</div>

<script>
async function handleSubmit(e){
  e.preventDefault();
  const btn=document.getElementById('submitBtn');
  const error=document.getElementById('formError');
  const success=document.getElementById('formSuccess');
  const form=document.getElementById('waitlistForm');
  btn.textContent='Sending\u2026';
  btn.disabled=true;
  error.style.display='none';
  try{
    const res=await fetch(form.action,{method:'POST',body:new FormData(form),headers:{'Accept':'application/json'}});
    if(res.ok){
      btn.style.display='none';
      form.querySelector('.email-input').style.display='none';
      form.querySelector('.fine-print').style.display='none';
      success.style.display='block';
    }else{
      throw new Error('fail');
    }
  }catch(err){
    error.style.display='block';
    btn.textContent='Notify me';
    btn.disabled=false;
  }
}
</script>

</body>
</html>
